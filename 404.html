<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحه مورد نظر یافت نشد - لیست سرورهای تیم اسپیک ایران</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-page { text-align: center; padding: 4rem 1rem; min-height: 60vh; display: flex; align-items: center; justify-content: center; }
        .error-code { font-size: 6rem; font-weight: bold; color: var(--primary-color); margin-bottom: 1rem; }
        .error-message { font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 2rem; }
        .back-home { display: inline-block; padding: 12px 24px; background: var(--primary-color); color: white; text-decoration: none; border-radius: 8px; transition: all 0.3s ease; }
        .back-home:hover { background: var(--secondary-color); transform: scale(1.05); }
    </style>
</head>
<body>
    <header class="header" role="banner">
        <div class="container">
            <div class="header-content">
                <h1 class="site-title">
                    <span class="site-name">لیست سرور های تیم اسپیک</span>
                    <span class="site-subtitle">برترین سرورهای ایران</span>
                </h1>
            </div>
        </div>
    </header>
    <main class="main">
        <div class="container">
            <div class="error-page">
                <div>
                    <div class="error-code">۴۰۴</div>
                    <p class="error-message">صفحه‌ای که به دنبال آن هستید یافت نشد!</p>
                    <a href="/" class="back-home">بازگشت به صفحه اصلی</a>
                </div>
            </div>
        </div>
    </main>
    <footer class="footer" role="contentinfo">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 1404 لیست سرور های تیم اسپیک ایران. تمامی حقوق محفوظ است.</p>
            </div>
        </div>
    </footer>
</body>
</html>
